<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식아가방 마켓 티커</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #0d1f3c;
    --navy2:   #162d52;
    --gold:    #f5c842;
    --gold2:   #e8a800;
    --cream:   #fdf6e3;
    --up:      #ff4e4e;
    --down:    #3b9eff;
    --flat:    #8899aa;
    --white:   #ffffff;
    --dim:     rgba(255,255,255,0.35);
    --sep:     rgba(255,255,255,0.1);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    background: transparent;
    width: 1920px;
    height: 72px;
    overflow: hidden;
  }

  /* ── 전체 바 ── */
  .ticker-bar {
    width: 1920px;
    height: 72px;
    display: flex;
    align-items: stretch;
    position: relative;
    font-family: 'Gmarket Sans', sans-serif;
  }

  /* 왼쪽 브랜드 패널 */
  .brand {
    width: 200px;
    flex-shrink: 0;
    background: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    z-index: 2;
    clip-path: polygon(0 0, 100% 0, 88% 100%, 0 100%);
    padding-right: 20px;
  }
  .brand-icon { font-size: 22px; line-height: 1; }
  .brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .brand-main {
    font-size: 13px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: -0.3px;
  }
  .brand-sub {
    font-size: 9px;
    font-weight: 500;
    color: rgba(13,31,60,0.65);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* 데이터 영역 */
  .data-area {
    flex: 1;
    background: linear-gradient(90deg, #0d1f3c 0%, #162d52 100%);
    display: flex;
    align-items: center;
    padding: 0 24px 0 30px;
    gap: 0;
    border-top: 1px solid rgba(245,200,66,0.3);
    border-bottom: 1px solid rgba(245,200,66,0.3);
    position: relative;
    overflow: hidden;
  }

  /* 배경 미세 패턴 */
  .data-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 120px,
      rgba(255,255,255,0.015) 120px,
      rgba(255,255,255,0.015) 121px
    );
  }

  /* 개별 지수 카드 */
  .item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 28px 0 0;
    margin-right: 4px;
    position: relative;
    flex-shrink: 0;
  }
  .item + .item::before {
    content: '';
    position: absolute;
    left: -16px;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 32px;
    background: var(--sep);
  }

  /* 라벨 영역 */
  .item-label {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 68px;
  }
  .item-name {
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    line-height: 1;
  }
  .item-sub {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.5px;
    font-weight: 300;
  }

  /* 숫자 영역 */
  .item-nums {
    display: flex;
    flex-direction: column;
    gap: 3px;
    align-items: flex-start;
  }
  .item-price {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: -0.5px;
    line-height: 1;
    transition: color 0.3s;
  }
  .item-price.tick-up   { color: var(--up);   }
  .item-price.tick-down { color: var(--down); }

  .item-change {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .chg-val { color: var(--flat); }
  .chg-val.up   { color: var(--up);   }
  .chg-val.down { color: var(--down); }
  .chg-pct {
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
  }
  .chg-pct.up   { background: rgba(255,78,78,0.15);  color: var(--up);   }
  .chg-pct.down { background: rgba(59,158,255,0.15); color: var(--down); }
  .chg-pct.flat { background: rgba(136,153,170,0.1); color: var(--flat); }

  /* 구분 레이블 (KR / GLOBAL) */
  .section-label {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(245,200,66,0.4);
    padding: 0 20px;
    flex-shrink: 0;
    align-self: center;
    writing-mode: horizontal-tb;
    border-left: 1px solid var(--sep);
    border-right: 1px solid var(--sep);
    height: 100%;
    display: flex;
    align-items: center;
    margin: 0 8px;
  }

  /* 오른쪽 시간/상태 패널 */
  .time-panel {
    width: 160px;
    flex-shrink: 0;
    background: var(--navy2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    border-left: 1px solid rgba(245,200,66,0.2);
    border-top: 1px solid rgba(245,200,66,0.3);
    border-bottom: 1px solid rgba(245,200,66,0.3);
  }
  .time-clock {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 1px;
  }
  .time-date {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.5px;
    font-weight: 300;
  }
  .market-status {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 10px;
  }
  .market-status.open   { background: rgba(255,78,78,0.2);  color: var(--up);   }
  .market-status.closed { background: rgba(136,153,170,0.15); color: var(--flat); }

  /* 로딩 shimmer */
  .shimmer {
    background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    color: transparent !important;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* 가격 변동 플래시 */
  @keyframes flash-up   { 0%,100%{background:transparent} 30%{background:rgba(255,78,78,0.08)} }
  @keyframes flash-down { 0%,100%{background:transparent} 30%{background:rgba(59,158,255,0.08)} }
  .fx-up   { animation: flash-up   0.6s ease; }
  .fx-down { animation: flash-down 0.6s ease; }

  /* 진입 애니메이션 */
  @keyframes slide-in {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .item { animation: slide-in 0.5s ease both; }
  .item:nth-child(1) { animation-delay: 0.0s; }
  .item:nth-child(2) { animation-delay: 0.08s; }
  .item:nth-child(3) { animation-delay: 0.16s; }
  .item:nth-child(4) { animation-delay: 0.24s; }
  .item:nth-child(5) { animation-delay: 0.32s; }
</style>
</head>
<body>

<div class="ticker-bar">

  <!-- 브랜드 -->
  <div class="brand">
    <div class="brand-icon">🍼</div>
    <div class="brand-text">
      <span class="brand-main">주식아가방</span>
      <span class="brand-sub">LIVE MARKET</span>
    </div>
  </div>

  <!-- 데이터 영역 -->
  <div class="data-area" id="data-area">

    <!-- 국내 지수 -->
    <div class="item" id="item-kospi">
      <div class="item-label">
        <span class="item-name">KOSPI</span>
        <span class="item-sub">코스피</span>
      </div>
      <div class="item-nums">
        <div class="item-price shimmer" id="kospi-price">0,000.00</div>
        <div class="item-change">
          <span class="chg-val shimmer" id="kospi-diff">▲ 00.00</span>
          <span class="chg-pct flat shimmer" id="kospi-pct">+0.00%</span>
        </div>
      </div>
    </div>

    <div class="item" id="item-kosdaq">
      <div class="item-label">
        <span class="item-name">KOSDAQ</span>
        <span class="item-sub">코스닥</span>
      </div>
      <div class="item-nums">
        <div class="item-price shimmer" id="kosdaq-price">000.00</div>
        <div class="item-change">
          <span class="chg-val shimmer" id="kosdaq-diff">▲ 00.00</span>
          <span class="chg-pct flat shimmer" id="kosdaq-pct">+0.00%</span>
        </div>
      </div>
    </div>

    <!-- 구분 -->
    <div class="section-label">GLOBAL</div>

    <!-- 글로벌 지수 -->
    <div class="item" id="item-sp500">
      <div class="item-label">
        <span class="item-name">S&amp;P 500</span>
        <span class="item-sub">미국 대형주</span>
      </div>
      <div class="item-nums">
        <div class="item-price shimmer" id="sp500-price">0,000.00</div>
        <div class="item-change">
          <span class="chg-val shimmer" id="sp500-diff">▲ 00.00</span>
          <span class="chg-pct flat shimmer" id="sp500-pct">+0.00%</span>
        </div>
      </div>
    </div>

    <div class="item" id="item-oil">
      <div class="item-label">
        <span class="item-name">WTI</span>
        <span class="item-sub">국제유가 (배럴)</span>
      </div>
      <div class="item-nums">
        <div class="item-price shimmer" id="oil-price">$00.00</div>
        <div class="item-change">
          <span class="chg-val shimmer" id="oil-diff">▲ 0.00</span>
          <span class="chg-pct flat shimmer" id="oil-pct">+0.00%</span>
        </div>
      </div>
    </div>

    <div class="item" id="item-us10y">
      <div class="item-label">
        <span class="item-name">US 10Y</span>
        <span class="item-sub">미국채 10년</span>
      </div>
      <div class="item-nums">
        <div class="item-price shimmer" id="us10y-price">0.000%</div>
        <div class="item-change">
          <span class="chg-val shimmer" id="us10y-diff">▲ 0.000</span>
          <span class="chg-pct flat shimmer" id="us10y-pct">+0.00%</span>
        </div>
      </div>
    </div>

  </div><!-- /data-area -->

  <!-- 시간 패널 -->
  <div class="time-panel">
    <div class="time-clock" id="clock">--:--:--</div>
    <div class="time-date" id="date-str">---- -- --</div>
    <div class="market-status closed" id="mkt-status">장외</div>
  </div>

</div>

<script>
// ────────────────────────────────────────────────
// ⚠️  API_BASE를 Vercel 배포 후 본인 URL로 교체하세요
//     예: const API_BASE = 'https://agabang.vercel.app';
// ────────────────────────────────────────────────
const API_BASE = '';   // ← Vercel URL 입력 (배포 전엔 빈칸)

const prev = {};

const CFG = {
  kospi:  { prefix:'₩', dec:2, label:'코스피' },
  kosdaq: { prefix:'₩', dec:2, label:'코스닥' },
  sp500:  { prefix:'',  dec:2, label:'S&P500' },
  oil:    { prefix:'$', dec:2, label:'WTI유가' },
  us10y:  { prefix:'',  dec:3, label:'미국10년채', suffix:'%' },
};

function fmt(key, price) {
  const c = CFG[key];
  const n = price.toLocaleString('ko-KR', {
    minimumFractionDigits: c.dec,
    maximumFractionDigits: c.dec,
  });
  return (c.prefix || '') + n + (c.suffix || '');
}

function render(key, data) {
  if (!data) return;
  const { price, diff, pct } = data;
  const dir   = diff > 0.0005 ? 'up' : diff < -0.0005 ? 'down' : 'flat';
  const sign  = dir === 'up' ? '▲' : dir === 'down' ? '▼' : '■';
  const item  = document.getElementById(`item-${key}`);
  const prEl  = document.getElementById(`${key}-price`);
  const dfEl  = document.getElementById(`${key}-diff`);
  const ptEl  = document.getElementById(`${key}-pct`);

  // 틱 감지
  if (prev[key] !== undefined && prev[key] !== price) {
    const td = price > prev[key] ? 'up' : 'down';
    prEl.classList.remove('tick-up','tick-down');
    void prEl.offsetWidth;
    prEl.classList.add(`tick-${td}`);
    item.classList.remove('fx-up','fx-down');
    void item.offsetWidth;
    item.classList.add(`fx-${td}`);
    setTimeout(() => prEl.classList.remove('tick-up','tick-down'), 700);
  }
  prev[key] = price;

  // shimmer 제거
  prEl.classList.remove('shimmer');
  dfEl.classList.remove('shimmer');
  ptEl.classList.remove('shimmer');

  prEl.textContent = fmt(key, price);
  dfEl.textContent = `${sign} ${Math.abs(diff).toFixed(CFG[key].dec)}`;
  dfEl.className   = `chg-val ${dir}`;
  ptEl.textContent = `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%`;
  ptEl.className   = `chg-pct ${dir}`;
}

async function fetchData() {
  const url = API_BASE ? `${API_BASE}/api/market` : null;
  if (!url) {
    // API_BASE 미설정 시 mock 표시
    showError('Vercel URL을 widget.html에 설정해 주세요');
    return;
  }
  try {
    const res  = await fetch(url, { cache: 'no-store' });
    const json = await res.json();
    for (const key of ['kospi','kosdaq','sp500','oil','us10y']) {
      render(key, json[key]);
    }
    updateMarketStatus(json.kospi?.state);
  } catch(e) {
    showError('데이터 로드 실패');
  }
}

function showError(msg) {
  document.getElementById('mkt-status').textContent = msg;
}

function updateMarketStatus(state) {
  const el = document.getElementById('mkt-status');
  const map = { REGULAR:'장중 🔴', PRE:'프리마켓', POST:'장후', POSTPOST:'장후', CLOSED:'장외' };
  const label = map[state] || '장외';
  el.textContent = label;
  el.className   = `market-status ${state === 'REGULAR' ? 'open' : 'closed'}`;
}

// 시계
function tick() {
  const now  = new Date();
  const hms  = now.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
  const ymd  = now.toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' });
  document.getElementById('clock').textContent    = hms;
  document.getElementById('date-str').textContent = ymd;
}

tick();
setInterval(tick, 1000);
fetchData();
setInterval(fetchData, 15000);
</script>
</body>
</html>
